<ion-content [fullscreen]="true" class="login-bg">
  <div class="login-container">
    <div class="glass-card">
      <div class="logo-section">
        <div class="logo-circle">
          <ion-icon name="git-network-outline"></ion-icon>
        </div>
        <h2>Jenkins Test to</h2>
        <p>Sign in to your dashboard</p>
      </div>

      <form (ngSubmit)="login()">
        <div class="input-group">
          <ion-item lines="none" class="custom-input">
            <ion-icon name="person-outline" slot="start"></ion-icon>
            <ion-input type="text" placeholder="Username" [(ngModel)]="username" name="username" required></ion-input>
          </ion-item>
        </div>

        <div class="input-group">
          <ion-item lines="none" class="custom-input">
            <ion-icon name="lock-closed-outline" slot="start"></ion-icon>
            <ion-input type="password" placeholder="Password" [(ngModel)]="password" name="password" required></ion-input>
          </ion-item>
        </div>

        <div class="options">
          <ion-item lines="none" class="checkbox-item">
            <ion-checkbox slot="start"></ion-checkbox>
            <ion-label>Remember me</ion-label>
          </ion-item>
          <a href="#" class="forgot-link">Forgot password?</a>
        </div>

        <ion-button expand="block" type="submit" class="login-btn" [disabled]="!username || !password">
          Sign In
        </ion-button>
      </form>
      
      <div class="footer-links">
        <p>Don't have an account? <a href="#">Create one</a></p>
      </div>
    </div>
  </div>
</ion-content>
